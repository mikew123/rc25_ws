# Transform GPS nav data to ros2 map based data
navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0

    # IMU is calibrated
    magnetic_declination_radians: 0.0

    yaw_offset: 0.0 # Compass is processed to get Est = 0.0

    zero_altitude: true
    broadcast_utm_transform: true
    publish_filtered_gps: true
    use_odometry_yaw: false # use IMU compass #true
    wait_for_datum: true # ? does not seem to wait 
    # If not set to gps close (default set to 0,0,0) the nav2 code errors and does not start
    # I set a approx GPS here and then set the datum param with accurate current GPS
    datum: [32.7702773,  -96.8377211, 0.0] # [lat, lon, alt]